services:
  signal-cli:
    build:
      context: .
      dockerfile: docker/Dockerfile.signal
    image: ${PHYSICLAW_SIGNAL_IMAGE:-physiclaw/signal-cli:local}
    volumes:
      - signal-cli-data:/home/.local/share/signal-cli
    command: ["signal-cli", "daemon", "--http=0.0.0.0:8080", "--receive-mode", "on-start"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  physiclaw-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PHYSICLAW_IMAGE:-physiclaw/core:local}
    depends_on:
      - signal-cli
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.physiclaw
      PHYSICLAW_GATEWAY_TOKEN: ${PHYSICLAW_GATEWAY_TOKEN}
      PHYSICLAW_TELEMETRY: "off"
      PHYSICLAW_PHONE_HOME: "disabled"
      PL_LICENSE: ${PL_LICENSE:-oss}
      PL_CLUSTER_NAME: ${PL_CLUSTER_NAME:-my-agents}
    volumes:
      - ${PHYSICLAW_CONFIG_DIR:-./config}:/home/node/.physiclaw
      - ${PHYSICLAW_DATA_DIR:-./data}:/home/node/.physiclaw/workspace
    ports:
      - "${PHYSICLAW_GATEWAY_PORT:-8090}:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${PHYSICLAW_GATEWAY_BIND:-lan}",
        "--port",
        "8090",
      ]

  physiclaw-cli:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PHYSICLAW_IMAGE:-physiclaw/core:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.physiclaw
      PHYSICLAW_GATEWAY_TOKEN: ${PHYSICLAW_GATEWAY_TOKEN}
      PL_LICENSE: ${PL_LICENSE:-oss}
    volumes:
      - ${PHYSICLAW_CONFIG_DIR:-./config}:/home/node/.physiclaw
      - ${PHYSICLAW_DATA_DIR:-./data}:/home/node/.physiclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]

volumes:
  signal-cli-data:
